<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #0f172a; /* matches slate-900 */
      color: #ffffff;
      padding: 16px;
      margin: 0;
    }
    h3 { margin-top: 0; color: #60a5fa; }
    p { font-size: 12px; color: #94a3b8; }
    input {
      width: 100%;
      padding: 8px;
      background-color: #1e293b;
      border: 1px border #334155;
      color: white;
      border-radius: 6px;
      box-sizing: border-box;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 8px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background-color: #1d4ed8; }
    .status { font-size: 11px; text-align: center; margin-top: 8px; color: #34d399; }
  </style>
</head>
<body>
  <h3>🛡️ DeepFake Guard</h3>
  <p>Paste your secret API key from the developer dashboard to activate right-click scanning.</p>
  
  <input type="password" id="apiKeyInput" placeholder="df_live_..." />
  <button id="saveBtn">Save API Key</button>
  
  <div id="statusMsg" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
